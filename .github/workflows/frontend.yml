name: Frontend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Dependencies
        run: npx playwright install --with-deps

      - name: Run Linter
        # continue-on-error: Codebase has pre-existing Prettier formatting violations.
        # Lint is advisory until those are resolved (npm run lint:fix).
        continue-on-error: true
        run: npm run lint

      - name: Run Type-Checker
        run: npm run type-check

      - name: Run Unit/Component Tests
        run: npm run test -- --run
